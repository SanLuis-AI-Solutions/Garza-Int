name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'Docs/**'
      - 'docs/**'
      - '.gitignore'
      - '.health/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'Docs/**'
      - 'docs/**'
      - '.gitignore'
      - '.health/**'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .health | Out-Null
          pwsh -File scripts/verify.ps1 -Ci -ReportPath .health/report.md

      - name: Upload Verification Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verification-report
          path: .health/report.md
          retention-days: 7
