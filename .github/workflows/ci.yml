name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .health | Out-Null
          pwsh -File scripts/verify.ps1 -Ci -ReportPath .health/report.md

      - name: Upload Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: .health/report.md
