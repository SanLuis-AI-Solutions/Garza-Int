name: Weekly Health Report

on:
  schedule:
    # Mondays 14:00 UTC (adjust as desired)
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Verify
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path .health | Out-Null
          pwsh -File scripts/verify.ps1 -Ci -ReportPath .health/report.md
          "exit_code=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upsert Weekly Health Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'Weekly Health Report';
            const reportPath = '.health/report.md';
            const exitCode = Number('${{ steps.verify.outputs.exit_code }}' || '0');

            let body = '';
            try {
              body = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              body = `Health report file missing: ${reportPath}\n\nVerify exit code: ${exitCode}`;
            }

            // Add a short header for quick triage.
            const header = [
              `Last run: ${new Date().toISOString()}`,
              `Status: ${exitCode === 0 ? 'PASS' : 'FAIL'}`,
              '',
            ].join('\n');
            body = header + body;

            // Find existing open issue with the same title (prefer the most recent).
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((i) => i.title === title);

            const labels = ['automation', 'health'];
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
                labels,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }

      - name: Fail Job If Verify Failed
        if: ${{ steps.verify.outputs.exit_code != '0' }}
        shell: pwsh
        run: |
          Write-Error "Verify failed with exit code ${{ steps.verify.outputs.exit_code }}"
